# ---------------------------------------------------------------------------
# Datasource (PostgreSQL) — Flyway owns the schema
# ---------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql

# dev + prod connect to a real Postgres (docker-compose / env). %test sets no
# url/credentials so Quarkus Dev Services spins up an ephemeral container.
%dev.quarkus.datasource.username=${DB_USER:fraud}
%dev.quarkus.datasource.password=${DB_PASSWORD:fraud}
%dev.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5434/fraud}
%prod.quarkus.datasource.username=${DB_USER:fraud}
%prod.quarkus.datasource.password=${DB_PASSWORD:fraud}
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5434/fraud}

quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.database.generation=none

# %test uses Quarkus Dev Services (Testcontainers) for an ephemeral Postgres.
%test.quarkus.datasource.devservices.image-name=postgres:16

# JaCoCo: let the jacoco-maven-plugin own the merged report (unit + QuarkusTest coverage).
%test.quarkus.jacoco.reuse-data-file=true
%test.quarkus.jacoco.report=false

# ---------------------------------------------------------------------------
# LangChain4j — provider selection (BUILD-TIME)
# Both ai-gemini and ollama extensions are on the classpath; this picks which one
# backs the @RegisterAiService FraudTriageAgent. Changing it requires a rebuild
# (in `quarkus:dev` a change triggers a live restart). Valid values: ai-gemini | ollama.
#   LLM_PROVIDER=ollama ./mvnw quarkus:dev    # run fully offline on Ollama
# ---------------------------------------------------------------------------
quarkus.langchain4j.chat-model.provider=${LLM_PROVIDER:ai-gemini}

# Google AI Gemini — key + model from .env. Get a free key: https://aistudio.google.com/apikey
quarkus.langchain4j.ai.gemini.api-key=${GEMINI_API_KEY:}
# gemini-3.1-flash-lite has the most generous free tier (15 RPM / 500 RPD). Higher-quality
# alternatives on the free tier (20 RPD): gemini-3.5-flash, gemini-3-flash-preview, gemini-2.5-flash.
# NOTE: gemini-2.0-flash has NO free quota — do not use it on the free tier.
quarkus.langchain4j.ai.gemini.chat-model.model-id=${GEMINI_MODEL:gemini-3.1-flash-lite}
quarkus.langchain4j.ai.gemini.timeout=60s

# Ollama (local, no key). Used when LLM_PROVIDER=ollama. A configured base-url also
# disables the Ollama Dev Services container.
quarkus.langchain4j.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
quarkus.langchain4j.ollama.chat-model.model-id=${OLLAMA_CHAT_MODEL:qwen3:30b}
# Disable qwen3 "thinking" for triage: native Ollama think param (quarkus-langchain4j >= 1.10).
# Triage is a classify-and-return-JSON task — reasoning tokens just add latency + variance.
quarkus.langchain4j.ollama.chat-model.model-options.think=false
quarkus.langchain4j.ollama.timeout=120s

# Tests pin the Gemini provider (FraudTriageWireMockTest stubs the Gemini HTTP path);
# a placeholder key is enough since the agent is mocked / WireMock'd.
%test.quarkus.langchain4j.chat-model.provider=ai-gemini
%test.quarkus.langchain4j.ai.gemini.api-key=test-gemini-key

# ---------------------------------------------------------------------------
# Dataset loading (PaySim CSV -> fraud_txn_sample staging table)
# ---------------------------------------------------------------------------
app.dataset.path=${DATASET_PATH:./data}
app.dataset.max-rows=${DATASET_MAX_ROWS:100000}
app.dataset.enabled=${DATASET_ENABLED:true}
# never touch the multi-hundred-MB CSV during the test suite
%test.app.dataset.enabled=false

# ---------------------------------------------------------------------------
# Logging — request/response bodies + correlation id (HttpLoggingFilter)
# ---------------------------------------------------------------------------
app.logging.max-body=${LOG_MAX_BODY:2000}

# surface the per-request correlation id (MDC) on every console log line
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) [%X{correlationId}] %s%e%n

# one-line access log per API request
quarkus.http.access-log.enabled=${LOG_ACCESS:true}
quarkus.http.access-log.pattern=%h "%r" %s %b bytes %D ms
quarkus.http.record-request-start-time=true

# LLM traffic — full HTTP request/response (method, url, headers, JSON body, response). Enable
# with LOG_LLM=true. The Gemini client puts the API key in the request URL (?key=...); it is
# masked by SecretRedactingLogFilter (installed by LogRedactionInstaller, verified at runtime by
# SecretRedactionWiringTest), so the key never reaches the logs.
quarkus.langchain4j.ai.gemini.log-requests=${LOG_LLM:false}
quarkus.langchain4j.ai.gemini.log-responses=${LOG_LLM:false}
quarkus.langchain4j.ollama.log-requests=${LOG_LLM:false}
quarkus.langchain4j.ollama.log-responses=${LOG_LLM:false}

# SQL statements with bind parameters
quarkus.hibernate-orm.log.sql=${LOG_SQL:false}
quarkus.hibernate-orm.log.bind-parameters=${LOG_SQL:false}

# keep the test suite output quiet
%test.quarkus.http.access-log.enabled=false
%test.quarkus.langchain4j.ai.gemini.log-requests=false
%test.quarkus.langchain4j.ai.gemini.log-responses=false
%test.quarkus.langchain4j.ollama.log-requests=false
%test.quarkus.langchain4j.ollama.log-responses=false

# ---------------------------------------------------------------------------
# OpenAPI / Swagger UI
# ---------------------------------------------------------------------------
quarkus.smallrye-openapi.info-title=BIAN Fraud Detection API
quarkus.smallrye-openapi.info-description=BIAN Fraud Detection service domain with Gemini-backed AI triage
quarkus.swagger-ui.always-include=true
