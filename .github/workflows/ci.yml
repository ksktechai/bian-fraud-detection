name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test (offline — mocked agent + Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Docker is preinstalled on ubuntu-latest; Quarkus Dev Services starts an
      # ephemeral Postgres container via Testcontainers. No Ollama is needed —
      # FraudEvaluateTest mocks FraudTriageAgent, and the test profile disables
      # the CSV DataLoader (app.dataset.enabled=false).
      - name: Verify
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
