services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fraud-postgres
    ports:
      # host 5434 (5432 is commonly taken by other local Postgres containers)
      - "5434:5432"
    environment:
      POSTGRES_DB: fraud
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
    volumes:
      - fraud-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  fraud-pgdata:
