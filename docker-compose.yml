services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fraud-postgres
    ports:
      # host 5434 (5432 is commonly taken by other local Postgres containers)
      - "5434:5432"
    environment:
      POSTGRES_DB: fraud
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
    volumes:
      - fraud-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional DB browser. Not started by default — run with: docker compose --profile tools up -d
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fraud-pgadmin
    profiles: ["tools"]
    environment:
      # must be a valid, non-reserved domain — pgAdmin rejects .local etc.
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      # desktop mode: no master-password / extra login prompt
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  fraud-pgdata:
